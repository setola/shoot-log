name: Deploy PWA to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: https://shootlog.emanueletessore.com/
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Verify Google OAuth client id is available
        run: test -n "$VITE_GOOGLE_CLIENT_ID"
        env:
          VITE_GOOGLE_CLIENT_ID: ${{ secrets.VITE_GOOGLE_CLIENT_ID }}

      - name: Build
        run: npm run build
        env:
          GITHUB_PAGES: 'true'
          VITE_GOOGLE_CLIENT_ID: ${{ secrets.VITE_GOOGLE_CLIENT_ID }}

      - name: Publish dist to gh-pages branch
        run: |
          set -euo pipefail
          rm -rf /tmp/shoot-log-pages
          mkdir -p /tmp/shoot-log-pages
          cp -R dist/. /tmp/shoot-log-pages/
          touch /tmp/shoot-log-pages/.nojekyll

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          if git ls-remote --exit-code --heads origin gh-pages >/dev/null 2>&1; then
            git fetch origin gh-pages
            git switch --force-create gh-pages origin/gh-pages
          else
            git switch --orphan gh-pages
          fi

          git rm -rf . >/dev/null 2>&1 || true
          cp -R /tmp/shoot-log-pages/. .
          git add .
          git commit -m "Deploy ${GITHUB_SHA}" || exit 0
          git push origin gh-pages
